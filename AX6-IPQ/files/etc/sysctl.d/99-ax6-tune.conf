# AX6 sysctl 调优 — 由 procd-sysctl 在合适时机加载

# 拥塞控制: BBR + fq_codel (或 fq, 若内核编译了 CONFIG_NET_SCH_FQ)
net.core.default_qdisc=fq_codel
net.ipv4.tcp_congestion_control=bbr

# 网络多队列 / backlog
net.core.rps_sock_flow_entries=32768
net.core.netdev_max_backlog=16384
net.core.somaxconn=4096
net.core.netdev_budget=65536
net.core.netdev_budget_usecs=8000

# Socket 缓冲
net.core.rmem_max=8388608
net.core.wmem_max=8388608
net.ipv4.tcp_rmem=4096 87380 8388608
net.ipv4.tcp_wmem=4096 65536 8388608
net.ipv4.tcp_fastopen=3
net.ipv4.tcp_slow_start_after_idle=0
net.ipv4.tcp_mtu_probing=1
net.ipv4.tcp_notsent_lowat=16384
net.ipv4.tcp_keepalive_time=600
net.ipv4.tcp_keepalive_intvl=15
net.ipv4.tcp_keepalive_probes=5

# Conntrack
net.netfilter.nf_conntrack_max=65536
# 86400 = 24h,长连接(SSH / 游戏 / mosh)在 NAT 下不被提前回收
net.netfilter.nf_conntrack_tcp_timeout_established=86400
net.netfilter.nf_conntrack_buckets=16384

# Bridge netfilter — 非 NSS 加速的慢速路径帧不需要 iptables hook
# CONFIG_KERNEL_BRIDGE_NETFILTER=y 可用, 但设为 0 节约 CPU0
net.bridge.bridge-nf-call-iptables=0
net.bridge.bridge-nf-call-ip6tables=0
net.bridge.bridge-nf-call-arptables=0

# NSS clock — 锁定最高频率, 消除突发流量 ramp-up 延迟
dev.nss.clock.auto_scale=0

# VM — 路由器场景优化
vm.min_free_kbytes=32768
vm.vfs_cache_pressure=50
