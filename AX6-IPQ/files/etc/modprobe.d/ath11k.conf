# ath11k 模块参数 — AX6 (IPQ8074) 极致配置
#
# frame_mode=2 (NSS_DP) — 让 ath11k 通过 NSS 数据通路收发(必须 NSS_REDIRECT=y)
# 不能给 frame_mode=0 否则走 SoftIRQ 完全绕过 NSS
options ath11k frame_mode=2

# ftm_responder=0 关闭 FTM 响应(客户端定位测距协议,默认关减少干扰)
# rx_hash=1 启用 RX 哈希(RPS / 多核分流)
options ath11k rx_hash=1

# nss_offload=1 强制 NSS 卸载(默认 1,显式声明)
options ath11k nss_offload=1

# crypto_mode=0 让 NSS-crypto 接管硬件加密(WPA2/3 GCMP/CCMP)
options ath11k crypto_mode=0

# softdep 确保 qca-nss-drv 先于 ath11k 加载,NSS 固件就绪后再注册 WiFi offload
softdep ath11k pre: qca-nss-drv

